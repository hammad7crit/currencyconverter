<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-gray-950 w-screen h-screen flex justify-center items-center box-border m-0 p-0">
    <!-- Main Container -->
    <div class="container bg-white w-80 h-100 rounded-2xl p-2">
        <div class="w-full flex justify-center">
            <h1 class="font-bold text-2xl">Currency Converter</h1>
        </div>
        <!-- Value of the currency text-->
        <h1 class="font-bold flex pt-2">Value</h1>
        <!-- The actual value (input) -->
        <input type="text" value="100" class="border-2 border-red-700 rounded-2xl pl-1">
        <!-- This div contains the from and to for currency converter (main feature) -->
        <div class="form-container flex justify-between">
            <!-- From div -->
            <div class="from-container flex">
                <img src="https://flagsapi.com/US/flat/64.png" class="img-from">
                <select name="from" class="select-from"> 
                </select>
            </div>
            <!-- To div -->
            <div class="from-container flex">
                <img src="https://flagsapi.com/US/flat/64.png" class="img-to">
                <select name="from" class="select-to">
                </select>
            </div>
        </div>
        <div class="div-textresult">
            <p>1 USD = 320 PKR</p>
            <button class="bg-purple-700 border-2 rounded-2xl border-none p-1">Get Exchange Button</button>
        </div>
    </div>
    <script src="codes.js"></script>
    <script src="app.js"></script>
</body> 
</html>
